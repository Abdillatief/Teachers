<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>أكاديمية سبيل - تسجيل الدخول</title>
  
  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/components.css">
  
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background-color: var(--bg-primary); padding: 1rem;">

  <div class="card" style="width: 100%; max-width: 440px; box-shadow: var(--shadow-lg);">
    <div style="text-align: center; margin-bottom: 2rem;">
      <div class="logo" style="justify-content: center; align-items: center; margin-bottom: 0.75rem; font-size: 2.2rem; flex-direction: column; gap: 0.5rem;" id="loginLogoContainer">
        <i data-lucide="graduation-cap" style="width:72px;height:72px;color:var(--primary-color);"></i>
        <span style="font-weight:800;">سبيل</span>
      </div>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">البريد الإلكتروني</label>
        <div style="position: relative; display: flex; align-items: center;">
          <input type="email" id="email" class="form-control" placeholder="name@example.com" required style="padding-right: 2.5rem;">
          <i data-lucide="mail" style="position: absolute; right: 0.75rem; color: var(--text-muted); width: 18px;"></i>
        </div>
      </div>

      <div class="form-group">
        <label for="password">كلمة المرور</label>
        <div style="position: relative; display: flex; align-items: center;">
          <input type="password" id="password" class="form-control" placeholder="••••••••" required style="padding-right: 2.5rem; padding-left: 2.5rem;">
          <i data-lucide="lock" style="position: absolute; right: 0.75rem; color: var(--text-muted); width: 18px;"></i>
          <button type="button" id="togglePasswordBtn" style="position: absolute; left: 0.75rem; background: none; border: none; color: var(--text-muted); cursor: pointer; display: flex; align-items: center;">
            <i data-lucide="eye" id="eyeIcon" style="width: 18px; height: 18px;"></i>
            <i data-lucide="eye-off" id="eyeOffIcon" style="width: 18px; height: 18px; display: none;"></i>
          </button>
        </div>
      </div>

      <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; font-size: 0.85rem;">
        <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer; color: var(--text-secondary);">
          <input type="checkbox" id="rememberMe"> تذكرني
        </label>
        <a href="#" id="forgotPasswordBtn" style="color: var(--primary-color); text-decoration: none;">نسيت كلمة المرور؟</a>
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%; gap: 0.5rem; font-size:1rem; font-weight:700;">
        <i data-lucide="log-in"></i> تسجيل الدخول
      </button>
    </form>

    <div style="margin-top: 1.5rem; text-align: center; font-size: 0.9rem; color: var(--text-secondary);">
      <span>ليس لديك حساب معلم؟</span>
      <a href="register.html" style="color: var(--primary-color); text-decoration: none; font-weight: 600; margin-right: 0.25rem;">سجل كمعلم جديد</a>
    </div>
  </div>

  <!-- نافذة استعادة كلمة المرور والتحقق البشري -->
  <div id="forgotPasswordModal" class="modal-overlay" style="display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px); align-items: center; justify-content: center; z-index: 9999; padding: 1rem;">
    <div class="card modal-card" style="width: 100%; max-width: 420px; position: relative; border: 1px solid var(--border-color); border-top: 4px solid var(--primary-color);">
      <button type="button" id="closeForgotModalBtn" style="position: absolute; left: 1rem; top: 1rem; background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--text-muted);">&times;</button>
      
      <div style="text-align: center; margin-bottom: 1.25rem;">
        <div style="width: 48px; height: 48px; background: var(--primary-light); color: var(--primary-color); border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 0.5rem;">
          <i data-lucide="shield-check" style="width: 24px; height: 24px;"></i>
        </div>
        <h3 style="font-size: 1.15rem; font-weight: 800; color: var(--text-primary);">استعادة حساب المعلم</h3>
        <p style="font-size: 0.82rem; color: var(--text-secondary); margin-top: 0.25rem;">يرجى تأكيد إثبات كود الإنسان وإدخال البريد الإلكتروني</p>
      </div>

      <form id="forgotPasswordForm">
        <div class="form-group" style="margin-bottom: 1rem;">
          <label for="forgotEmail">البريد الإلكتروني للمعلم</label>
          <div style="position: relative; display: flex; align-items: center;">
            <input type="email" id="forgotEmail" class="form-control" placeholder="name@example.com" required style="padding-right: 2.5rem;">
            <i data-lucide="mail" style="position: absolute; right: 0.75rem; color: var(--text-muted); width: 18px;"></i>
          </div>
        </div>

        <div class="form-group" style="margin-bottom: 1rem;">
          <label style="display: block; margin-bottom: 0.35rem; font-weight: 700;">كود التحقق البشري (Captcha)</label>
          <div style="display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.5rem;">
            <div id="captchaCodeDisplay" style="background: linear-gradient(135deg, var(--primary-color), #0f766e); color: #ffffff; font-weight: 900; font-size: 1.4rem; letter-spacing: 6px; padding: 0.4rem 1.25rem; border-radius: 8px; user-select: none; font-family: monospace; text-shadow: 1px 1px 2px rgba(0,0,0,0.3);">
              ----
            </div>
            <button type="button" id="refreshCaptchaBtn" class="btn btn-secondary" style="padding: 0.5rem; display: flex; align-items: center; justify-content: center;" title="تحديث كود التحقق">
              <i data-lucide="refresh-cw" style="width: 16px; height: 16px;"></i>
            </button>
          </div>
          <input type="text" id="captchaInput" class="form-control" placeholder="أدخل كود التحقق الأرقام أعلاه..." required maxlength="4" style="text-align: center; font-weight: 800; letter-spacing: 4px; font-size: 1.1rem;">
        </div>

        <div style="display: flex; gap: 0.5rem; margin-top: 1.5rem;">
          <button type="button" id="cancelForgotBtn" class="btn btn-secondary" style="flex: 1;">إلغاء</button>
          <button type="submit" class="btn btn-primary" style="flex: 2; font-weight: 700; gap: 0.5rem;">
            <i data-lucide="send"></i> إرسال للإدارة
          </button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast-container"></div>

  <script type="module" src="assets/js/features/auth/loginController.js"></script>
  
  <script>
    if (window.lucide) {
      window.lucide.createIcons();
    }
  </script>
</body>
</html>
