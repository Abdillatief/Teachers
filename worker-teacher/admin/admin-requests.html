<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>سبيل - لوحة إداري (طلبات الاستعادة)</title>
  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .admin-req-header {
      background: linear-gradient(135deg, var(--bg-secondary) 0%, rgba(139, 92, 246, 0.08) 100%);
      border: 1px solid var(--border-color);
      border-right: 5px solid #8b5cf6;
      border-radius: var(--border-radius);
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: var(--shadow-sm);
    }
    .req-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 1.25rem;
    }
    .req-card {
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius);
      padding: 1.25rem;
      position: relative;
      transition: all var(--transition-fast);
      box-shadow: var(--shadow-sm);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .req-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }
    .pwd-display-box {
      background-color: var(--bg-primary);
      border: 1px dashed #8b5cf6;
      border-radius: 8px;
      padding: 0.6rem 0.85rem;
      font-family: monospace;
      font-size: 1.1rem;
      font-weight: 800;
      color: #8b5cf6;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 0.4rem;
    }
    .filter-tab-btn {
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      color: var(--text-secondary);
      font-weight: 700;
      font-size: 0.82rem;
      padding: 0.4rem 0.85rem;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-tab-btn.active {
      background: #8b5cf6;
      color: #ffffff;
      border-color: #8b5cf6;
      box-shadow: 0 2px 8px rgba(139, 92, 246, 0.3);
    }
  </style>
</head>
<body>

  <div class="app-container">
    <aside class="sidebar" id="appSidebar"></aside>

    <div class="main-wrapper" id="mainWrapper">
      <nav class="navbar" id="appNavbar"></nav>

      <main class="content-body">
        
        <!-- الهيدر الأنيق والشريط المدمج المحسّن (بدون البارين العاديين) -->
        <div class="admin-req-header">
          <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;">
            <div>
              <div style="display: flex; align-items: center; gap: 0.6rem;">
                <div style="width: 42px; height: 42px; background: rgba(139, 92, 246, 0.15); color: #8b5cf6; border-radius: 12px; display: flex; align-items: center; justify-content: center;">
                  <i data-lucide="key-round" style="width: 22px; height: 22px;"></i>
                </div>
                <div>
                  <h1 style="font-size: 1.35rem; font-weight: 800; color: var(--text-primary); margin: 0; display: flex; align-items: center; gap: 0.5rem;">
                    لوحة إداري - طلبات استعادة الحسابات
                    <span id="pendingBadgeHeader" class="badge" style="background: var(--warning-light); color: var(--warning); font-size: 0.75rem; padding: 0.2rem 0.6rem; border-radius: 12px; font-weight: 800;">0 معلق</span>
                  </h1>
                  <p style="color: var(--text-secondary); font-size: 0.82rem; margin-top: 0.2rem; margin-bottom: 0;">
                    ربط مباشر مع قاعدة بيانات الفايرباس (Firestore) لعرض وتعديل كلمات مرور المعلمين فورياً.
                  </p>
                </div>
              </div>
            </div>

            <div style="display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap;">
              <!-- البحث المدمج -->
              <div style="position: relative; width: 220px;">
                <input type="text" id="searchInput" class="form-control form-control-sm" placeholder="بحث بالاسم أو البريد..." style="padding-right: 2.2rem; font-size: 0.82rem; border-radius: 20px;">
                <i data-lucide="search" style="position: absolute; right: 0.65rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); width: 15px;"></i>
              </div>

              <!-- فلتر الحالات كأزرار تبويب احترافية -->
              <div style="display: flex; gap: 0.35rem; background: var(--bg-primary); padding: 0.2rem; border-radius: 24px; border: 1px solid var(--border-color);">
                <button type="button" class="filter-tab-btn active" data-status="pending">المعلقة ⏳</button>
                <button type="button" class="filter-tab-btn" data-status="all">الكل 📋</button>
                <button type="button" class="filter-tab-btn" data-status="completed">المكتملة ✅</button>
              </div>

              <button class="btn btn-secondary btn-sm" id="refreshRequestsBtn" style="border-radius: 20px; font-weight: 700; gap: 0.3rem;" title="تحديث بيانات الفايرباس">
                <i data-lucide="refresh-cw" style="width: 14px; height: 14px;"></i>
              </button>
            </div>
          </div>
        </div>

        <!-- شبكة عرض الطلبات المباشرة المرتبطة بالفايرباس -->
        <div id="requestsListContainer" class="req-grid">
          <!-- سيتم التحميل التلقائي هنا -->
        </div>

      </main>
    </div>
  </div>

  <!-- نافذة تعديل كلمة المرور مباشرة في الفايرباس -->
  <div id="editPasswordModal" class="modal-overlay" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); align-items: center; justify-content: center; z-index: 99999; padding: 1rem;">
    <div class="card modal-card" style="width: 100%; max-width: 400px; position: relative; border-top: 4px solid #8b5cf6;">
      <button type="button" id="closeEditModalBtn" style="position: absolute; left: 1rem; top: 1rem; background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--text-muted);">&times;</button>

      <div style="text-align: center; margin-bottom: 1.25rem;">
        <div style="width: 44px; height: 44px; background: rgba(139, 92, 246, 0.15); color: #8b5cf6; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 0.5rem;">
          <i data-lucide="key" style="width: 22px; height: 22px;"></i>
        </div>
        <h3 style="font-size: 1.1rem; font-weight: 800; color: var(--text-primary);">تعديل كلمة المرور في الفايرباس</h3>
        <p id="editModalTeacherName" style="font-size: 0.82rem; color: var(--primary-color); font-weight: 700; margin-top: 0.25rem;"></p>
      </div>

      <form id="editPasswordForm">
        <input type="hidden" id="editModalUserId">
        <input type="hidden" id="editModalReqId">
        <input type="hidden" id="editModalSource">

        <div class="form-group" style="margin-bottom: 1.25rem;">
          <label style="font-size: 0.85rem; font-weight: 700;">كلمة المرور الجديدة للمعلم</label>
          <div style="position: relative; display: flex; align-items: center;">
            <input type="text" id="newPasswordInput" class="form-control" placeholder="أدخل كلمة مرور جديدة..." required style="padding-right: 2.5rem; font-family: monospace; font-weight: 800; letter-spacing: 1px;">
            <i data-lucide="lock" style="position: absolute; right: 0.75rem; color: var(--text-muted); width: 18px;"></i>
          </div>
          <small style="color: var(--text-muted); font-size: 0.75rem; display: block; margin-top: 0.35rem;">ستتم تحديث كلمة المرور هذه مباشرة في سجلات المعلم بذات الوقت.</small>
        </div>

        <div style="display: flex; gap: 0.5rem;">
          <button type="button" id="cancelEditModalBtn" class="btn btn-secondary" style="flex: 1;">إلغاء</button>
          <button type="submit" class="btn btn-primary" style="flex: 2; font-weight: 700; background: #8b5cf6; border-color: #8b5cf6; gap: 0.4rem;">
            <i data-lucide="save"></i> حفظ في الفايرباس
          </button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast-container"></div>

  <script type="module">
    import { db, auth } from '../assets/js/config/firebase.js';
    import { collection, onSnapshot, doc, updateDoc, deleteDoc, getDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { protectRoute } from '../assets/js/features/auth/authService.js';
    import { renderSidebar } from '../assets/js/shared/components/sidebar.js';
    import { renderNavbar } from '../assets/js/shared/components/navbar.js';
    import { Toast } from '../assets/js/shared/utils/toast.js';
    import { showCustomConfirm } from '../assets/js/shared/utils/helpers.js';

    protectRoute('admin');

    let allRequests = [];
    let firebaseUsersMap = new Map(); // Store live Firestore users by email
    let currentStatusFilter = 'pending';

    auth.onAuthStateChanged(async (user) => {
      if (user) {
        try {
          const userDoc = await getDoc(doc(db, "users", user.uid));
          if (userDoc.exists()) {
            const data = userDoc.data();
            renderSidebar('admin-requests', 'admin');
            renderNavbar('لوحة إداري - طلبات الاستعادة', { name: data.name || 'الإدارة العامة', roleName: 'مدير الأكاديمية' });
            
            initRequestsRealtime();
          }
        } catch (err) {
          console.error("Error fetching admin profile:", err);
        }
      }
    });

    function initRequestsRealtime() {
      // 1. Listen live to users collection in Firebase to keep passwords synced
      onSnapshot(collection(db, "users"), (userSnap) => {
        firebaseUsersMap.clear();
        userSnap.docs.forEach(d => {
          const u = d.data();
          if (u.email) {
            firebaseUsersMap.set(u.email.toLowerCase().trim(), {
              uid: d.id,
              ...u
            });
          }
        });

        // 2. Listen to passwordRequests collection
        onSnapshot(collection(db, "passwordRequests"), (snap) => {
          const passwordReqDocs = snap.docs.map(d => ({
            id: d.id,
            source: 'passwordRequests',
            ...d.data()
          }));

          // 3. Listen to notifications collection as well
          onSnapshot(collection(db, "notifications"), (notifSnap) => {
            const notifDocs = notifSnap.docs
              .filter(d => {
                const nd = d.data();
                return nd.type === 'password_reset_request' || nd.teacherPassword || (nd.title && nd.title.includes('استعادة'));
              })
              .map(d => {
                const nd = d.data();
                return {
                  id: d.id,
                  source: 'notifications',
                  teacherName: nd.teacherName || nd.title || 'معلم',
                  teacherEmail: nd.teacherEmail || nd.targetEmail || 'غير محدد',
                  teacherPhone: nd.teacherPhone || 'غير محدد',
                  teacherRole: nd.teacherRole || 'معلم',
                  teacherStatus: nd.teacherStatus || 'معتمد',
                  teacherPassword: nd.teacherPassword || 'غير مسجلة',
                  status: (nd.readBy && nd.readBy.length > 0) ? 'completed' : 'pending',
                  createdAt: nd.createdAt
                };
              });

            // Merge & deduplicate by email + timestamp
            const combinedMap = new Map();
            passwordReqDocs.forEach(item => combinedMap.set(item.id, item));
            notifDocs.forEach(item => {
              const existing = Array.from(combinedMap.values()).find(req => req.teacherEmail === item.teacherEmail && req.createdAt === item.createdAt);
              if (!existing) {
                combinedMap.set(item.id, item);
              }
            });

            allRequests = Array.from(combinedMap.values()).sort((a, b) => {
              const timeA = new Date(a.createdAt || 0).getTime();
              const timeB = new Date(b.createdAt || 0).getTime();
              return timeB - timeA;
            });

            renderRequestsUI();
          });
        });
      });
    }

    function renderRequestsUI() {
      const searchVal = document.getElementById('searchInput').value.trim().toLowerCase();

      // Filter list
      let filtered = allRequests.filter(req => {
        const matchesSearch = 
          (req.teacherName && req.teacherName.toLowerCase().includes(searchVal)) ||
          (req.teacherEmail && req.teacherEmail.toLowerCase().includes(searchVal)) ||
          (req.teacherPhone && req.teacherPhone.toLowerCase().includes(searchVal));

        const reqStatus = req.status || 'pending';
        const matchesStatus = (currentStatusFilter === 'all') || (reqStatus === currentStatusFilter);

        return matchesSearch && matchesStatus;
      });

      // Update header badge
      const pendingCount = allRequests.filter(r => (r.status || 'pending') === 'pending').length;
      const badgeEl = document.getElementById('pendingBadgeHeader');
      if (badgeEl) {
        badgeEl.textContent = `${pendingCount} معلق ⏳`;
        badgeEl.style.display = pendingCount > 0 ? 'inline-block' : 'none';
      }

      const container = document.getElementById('requestsListContainer');
      if (!container) return;

      if (filtered.length === 0) {
        container.innerHTML = `
          <div style="grid-column: 1 / -1; text-align: center; padding: 3rem 1rem; background: var(--bg-secondary); border-radius: var(--border-radius); border: 1px dashed var(--border-color);">
            <div style="width: 52px; height: 52px; background: var(--bg-primary); color: #8b5cf6; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 0.75rem;">
              <i data-lucide="shield-check" style="width: 26px; height: 26px;"></i>
            </div>
            <h3 style="font-size: 1.05rem; font-weight: 800; color: var(--text-primary); margin: 0;">لا توجد طلبات استعادة معلقة حالياً</h3>
            <p style="font-size: 0.82rem; color: var(--text-muted); margin-top: 0.25rem;">جميع طلبات استعادة كلمات المرور تمت معالجتها أو لا توجد نتائج مطابقة للبحث.</p>
          </div>
        `;
        if (window.lucide) window.lucide.createIcons();
        return;
      }

      container.innerHTML = filtered.map(req => {
        const isPending = (req.status || 'pending') === 'pending';
        const dateStr = req.createdAt ? (req.createdAt.seconds ? new Date(req.createdAt.seconds * 1000).toLocaleString('ar-EG') : new Date(req.createdAt).toLocaleString('ar-EG')) : 'غير محدد';
        const cleanPhone = req.teacherPhone ? req.teacherPhone.replace(/[^0-9+]/g, '') : '';
        
        // Match with live user record in Firebase Firestore
        const liveUser = req.teacherEmail ? firebaseUsersMap.get(req.teacherEmail.toLowerCase().trim()) : null;
        const livePassword = (liveUser && (liveUser.plainPassword || liveUser.password)) 
          ? (liveUser.plainPassword || liveUser.password) 
          : (req.teacherPassword || 'غير مسجلة');

        const liveUserId = liveUser ? liveUser.uid : '';

        return `
          <div class="req-card" style="border-top: 4px solid ${isPending ? 'var(--warning)' : 'var(--success)'};">
            <div>
              <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.75rem;">
                <div style="display: flex; align-items: center; gap: 0.6rem;">
                  <div style="width: 42px; height: 42px; border-radius: 50%; background: linear-gradient(135deg, #8b5cf6, #0f766e); color: #ffffff; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1rem; box-shadow: 0 2px 6px rgba(0,0,0,0.15);">
                    ${req.teacherName ? req.teacherName.charAt(0) : 'م'}
                  </div>
                  <div>
                    <h4 style="font-size: 0.98rem; font-weight: 800; color: var(--text-primary); margin: 0;">${req.teacherName || 'غير محدد'}</h4>
                    <span style="font-size: 0.72rem; color: var(--text-muted);">${req.teacherRole || 'معلم'} • ${req.teacherStatus || 'معتمد'}</span>
                  </div>
                </div>

                <span class="badge" style="background-color: ${isPending ? 'var(--warning-light)' : 'var(--success-light)'}; color: ${isPending ? 'var(--warning)' : 'var(--success)'}; font-weight: 800; font-size: 0.72rem; padding: 0.25rem 0.6rem; border-radius: 12px;">
                  ${isPending ? 'معلق ⏳' : 'مكتمل ✅'}
                </span>
              </div>

              <!-- تفاصيل حساب المعلم مع رابط واتساب -->
              <div style="background: var(--bg-primary); border: 1px solid var(--border-color); border-radius: 8px; padding: 0.65rem 0.85rem; font-size: 0.82rem; margin-bottom: 0.85rem; display: flex; flex-direction: column; gap: 0.35rem;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                  <span style="color: var(--text-muted); font-size: 0.75rem;">البريد الإلكتروني:</span>
                  <strong style="color: var(--primary-color); word-break: break-all; font-size: 0.82rem;">${req.teacherEmail || 'غير محدد'}</strong>
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                  <span style="color: var(--text-muted); font-size: 0.75rem;">رقم الهاتف:</span>
                  <div style="display: flex; align-items: center; gap: 0.5rem;">
                    <strong style="color: var(--text-primary); font-size: 0.82rem;">${req.teacherPhone || 'غير محدد'}</strong>
                    ${cleanPhone ? `
                      <a href="https://wa.me/${cleanPhone}" target="_blank" class="btn btn-sm" style="background: #25D366; color: white; padding: 0.15rem 0.45rem; font-size: 0.7rem; border-radius: 6px; font-weight: 700; text-decoration: none; display: inline-flex; align-items: center; gap: 0.2rem;" title="تواصل مباشر بالواتساب">
                        واتساب 💬
                      </a>
                    ` : ''}
                  </div>
                </div>
              </div>

              <!-- عرض وتعديل كلمة المرور المباشرة من الفايرباس -->
              <div style="margin-bottom: 1rem;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.25rem;">
                  <label style="font-size: 0.78rem; font-weight: 800; color: #8b5cf6;">🔑 كلمة المرور (مزامنة مباشرة مع الفايرباس):</label>
                  <button type="button" class="btn btn-sm edit-pwd-btn" data-userid="${liveUserId}" data-email="${req.teacherEmail}" data-name="${req.teacherName}" data-reqid="${req.id}" data-source="${req.source}" style="background: rgba(139, 92, 246, 0.1); color: #8b5cf6; border: none; font-size: 0.72rem; padding: 0.2rem 0.5rem; font-weight: 800;" title="تعديل كلمة المرور في الفايرباس">
                    تعديل ✏️
                  </button>
                </div>
                <div class="pwd-display-box">
                  <span style="user-select: all;">${livePassword}</span>
                  <button type="button" class="btn btn-sm btn-primary copy-pwd-btn" data-password="${livePassword}" style="font-size: 0.7rem; padding: 0.25rem 0.55rem; font-weight: 800;">
                    نسخ 📋
                  </button>
                </div>
              </div>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border-color); padding-top: 0.75rem; font-size: 0.72rem; color: var(--text-muted);">
              <span>الطلب: ${dateStr}</span>
              
              <div style="display: flex; gap: 0.35rem;">
                ${isPending ? `
                  <button type="button" class="btn btn-sm btn-success mark-done-btn" data-id="${req.id}" data-source="${req.source}" style="font-size: 0.72rem; padding: 0.3rem 0.6rem; font-weight: 800;">
                    تمت المعالجة ✅
                  </button>
                ` : ''}
                <button type="button" class="btn btn-sm delete-req-btn" data-id="${req.id}" data-source="${req.source}" style="background: rgba(239, 68, 68, 0.1); color: var(--danger); font-size: 0.72rem; padding: 0.3rem 0.5rem; font-weight: 800; border: none;">
                  حذف 🗑️
                </button>
              </div>
            </div>
          </div>
        `;
      }).join('');

      if (window.lucide) window.lucide.createIcons();

      // Bind actions
      container.querySelectorAll('.copy-pwd-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const pwd = btn.dataset.password;
          if (pwd && pwd !== 'غير مسجلة') {
            try {
              await navigator.clipboard.writeText(pwd);
              Toast.success('تم نسخ كلمة المرور إلى الحافظة بنجاح ✅');
            } catch (err) {
              console.error(err);
            }
          }
        });
      });

      // Bind edit password in Firebase
      container.querySelectorAll('.edit-pwd-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const userId = btn.dataset.userid;
          const email = btn.dataset.email;
          const name = btn.dataset.name;
          const reqId = btn.dataset.reqid;
          const source = btn.dataset.source;

          document.getElementById('editModalUserId').value = userId || '';
          document.getElementById('editModalReqId').value = reqId || '';
          document.getElementById('editModalSource').value = source || '';
          document.getElementById('editModalTeacherName').textContent = `المعلم: ${name} (${email})`;
          document.getElementById('newPasswordInput').value = '';

          const modal = document.getElementById('editPasswordModal');
          if (modal) modal.style.display = 'flex';
          if (window.lucide) window.lucide.createIcons();
        });
      });

      container.querySelectorAll('.mark-done-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = btn.dataset.id;
          const source = btn.dataset.source;
          try {
            if (source === 'passwordRequests') {
              await updateDoc(doc(db, "passwordRequests", id), {
                status: 'completed'
              });
            } else if (source === 'notifications') {
              await updateDoc(doc(db, "notifications", id), {
                readBy: ['admin']
              });
            }
            Toast.success('تمت معالجة الطلب بنجاح ✅');
          } catch (err) {
            console.error("Mark completed error:", err);
            Toast.error('حدث خطأ أثناء تحديث حالة الطلب.');
          }
        });
      });

      container.querySelectorAll('.delete-req-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const id = btn.dataset.id;
          const source = btn.dataset.source;
          showCustomConfirm('هل أنت متأكد من حذف هذا الطلب من السجلات؟', async () => {
            try {
              if (source === 'passwordRequests') {
                await deleteDoc(doc(db, "passwordRequests", id));
              } else if (source === 'notifications') {
                await deleteDoc(doc(db, "notifications", id));
              }
              Toast.success('تم حذف الطلب بنجاح 🗑️');
            } catch (err) {
              console.error("Delete request error:", err);
              Toast.error('حدث خطأ أثناء محاولة الحذف.');
            }
          });
        });
      });
    }

    // Modal controls for password editing
    const editModal = document.getElementById('editPasswordModal');
    const closeEditModalBtn = document.getElementById('closeEditModalBtn');
    const cancelEditModalBtn = document.getElementById('cancelEditModalBtn');
    const editPasswordForm = document.getElementById('editPasswordForm');

    function closeEditModal() {
      if (editModal) editModal.style.display = 'none';
    }

    if (closeEditModalBtn) closeEditModalBtn.addEventListener('click', closeEditModal);
    if (cancelEditModalBtn) cancelEditModalBtn.addEventListener('click', closeEditModal);

    if (editPasswordForm) {
      editPasswordForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const userId = document.getElementById('editModalUserId').value;
        const reqId = document.getElementById('editModalReqId').value;
        const source = document.getElementById('editModalSource').value;
        const newPwd = document.getElementById('newPasswordInput').value.trim();

        if (!newPwd) {
          Toast.warning('يرجى إدخال كلمة المرور الجديدة.');
          return;
        }

        try {
          // If userId exists, update user doc in Firestore
          if (userId) {
            await updateDoc(doc(db, "users", userId), {
              plainPassword: newPwd,
              password: newPwd
            });
          } else {
            // Find user doc by email
            const reqObj = allRequests.find(r => r.id === reqId);
            if (reqObj && reqObj.teacherEmail) {
              const qUser = query(collection(db, "users"), where("email", "==", reqObj.teacherEmail));
              const uSnap = await getDocs(qUser);
              if (!uSnap.empty) {
                await updateDoc(doc(db, "users", uSnap.docs[0].id), {
                  plainPassword: newPwd,
                  password: newPwd
                });
              }
            }
          }

          // Update password stored in request
          if (reqId && source === 'passwordRequests') {
            await updateDoc(doc(db, "passwordRequests", reqId), {
              teacherPassword: newPwd,
              status: 'completed'
            });
          }

          Toast.success('تم تحديث كلمة المرور في الفايرباس بنجاح للمعلم ✅');
          closeEditModal();

        } catch (err) {
          console.error("Edit password error:", err);
          Toast.error('حدث خطأ أثناء حفظ كلمة المرور في الفايرباس.');
        }
      });
    }

    // Filter Tab Buttons
    document.querySelectorAll('.filter-tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentStatusFilter = btn.dataset.status;
        renderRequestsUI();
      });
    });

    // Bind search and refresh
    document.getElementById('searchInput')?.addEventListener('input', renderRequestsUI);
    document.getElementById('refreshRequestsBtn')?.addEventListener('click', () => {
      renderRequestsUI();
      Toast.success('تمت إعادة المزامنة مع بيانات الفايرباس بنجاح.');
    });
  </script>
</body>
</html>
