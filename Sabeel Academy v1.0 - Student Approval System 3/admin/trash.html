<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>سبيل - سلة المهملات والمحذوفات</title>
  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <div class="app-container">
    <aside class="sidebar" id="appSidebar"></aside>

    <div class="main-wrapper" id="mainWrapper">
      <nav class="navbar" id="appNavbar"></nav>

      <main class="content-body">
        <div style="margin-bottom: 2rem;">
          <h1 style="font-size: 1.5rem; font-weight: 800; color: var(--text-primary);">سلة المحذوفات والمستندات المؤقتة</h1>
          <p style="color: var(--text-secondary); font-size: 0.9rem;">استعراض السجلات المحذوفة إدارياً، مع خيار استعادتها وتعميمها بنقرة واحدة.</p>
        </div>

        <div class="card">
          <div class="table-container" style="margin-top: 0;">
            <table>
              <thead>
                <tr>
                  <th>المستند المحذوف</th>
                  <th>النوع والمصدر</th>
                  <th>سبب وتاريخ الحذف</th>
                  <th>المشرف المنفذ</th>
                  <th>الإجراءات</th>
                </tr>
              </thead>
              <tbody id="trashTableBody">
                <tr><td colspan="5" style="text-align: center; color: var(--text-muted); padding: 1.5rem;">جاري مزامنة وجلب السجلات المحذوفة مع الخادم...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
  </div>

  <div id="toast-container"></div>

  <script type="module">
    import { auth, db } from '../assets/js/config/firebase.js';
    import { protectRoute } from '../assets/js/features/auth/authService.js';
    import { renderSidebar } from '../assets/js/shared/components/sidebar.js';
    import { renderNavbar } from '../assets/js/shared/components/navbar.js';
    import { collection, onSnapshot, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { Toast } from '../assets/js/shared/utils/toast.js';

    protectRoute('admin');

    let currentAdminName = "مشرف النظام";

    auth.onAuthStateChanged((user) => {
      if (user) {
        currentAdminName = user.displayName || "مدير الأكاديمية";
        renderSidebar('trash', 'admin');
        renderNavbar('سلة المحذوفات', { name: 'الإدارة العامة', roleName: 'مدير الأكاديمية' });
        initTrashRealtime();
      }
    });

    function initTrashRealtime() {
      const tbody = document.getElementById('trashTableBody');
      if (!tbody) return;

      onSnapshot(collection(db, "trash"), (snapshot) => {
        if (snapshot.empty) {
          tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: var(--text-muted); padding: 2rem;">سلة المحذوفات فارغة تماماً ولا توجد قيود معلقة.</td></tr>`;
          return;
        }

        const list = [];
        snapshot.forEach(docSnap => {
          list.push({ id: docSnap.id, ...docSnap.data() });
        });

        // فرز من الأحدث للأقدم
        list.sort((a, b) => {
          const dateA = a.deletedAt?.seconds || 0;
          const dateB = b.deletedAt?.seconds || 0;
          return dateB - dateA;
        });

        tbody.innerHTML = list.map(item => {
          const dateStr = item.deletedAt ? new Date(item.deletedAt.seconds * 1000).toLocaleString('ar-EG') : 'غير محدد';
          const payloadData = item.data || {};
          const label = payloadData.name || payloadData.studentName || item.originalId || "مستند مبهم";
          
          return `
            <tr>
              <td><strong>${label}</strong><div style="font-size: 0.75rem; color: var(--text-muted);">ID: ${item.originalId}</div></td>
              <td><span class="badge" style="position: static; background-color: var(--primary-light); color: var(--primary-color);">${item.originalCollection === 'users' ? 'معلم 👤' : 'طالب / حصة 📅'}</span></td>
              <td>${dateStr}<div style="font-size: 0.75rem; color: var(--danger); font-weight: 600;">السبب: ${item.deletionReason || 'حذف معلق'}</div></td>
              <td>${item.deletedByName || 'مدير عام'}</td>
              <td>
                <div style="display: flex; gap: 0.5rem;">
                  <button class="btn btn-primary restore-btn" data-id="${item.id}" style="padding: 0.25rem 0.5rem; font-size: 0.8rem;"><i data-lucide="rotate-ccw" style="width:14px;height:14px;"></i> استعادة</button>
                  <button class="btn btn-secondary delete-final-btn" data-id="${item.id}" style="padding: 0.25rem 0.5rem; font-size: 0.8rem; color: var(--danger);"><i data-lucide="trash-2" style="width:14px;height:14px;"></i> إتلاف</button>
                </div>
              </td>
            </tr>
          `;
        }).join('');

        if (window.lucide) {
          window.lucide.createIcons();
        }
        setupTrashListeners(list);
      });
    }

    function setupTrashListeners(list) {
      document.querySelectorAll('.restore-btn').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          const id = e.target.closest('.restore-btn').dataset.id;
          const record = list.find(r => r.id === id);
          if (!record) return;

          if (confirm(`هل تريد استعادة السجل المحذوف (${record.data?.name || record.data?.studentName || 'المستند'}) وإعادته لمكانه المعتمد فوراً؟`)) {
            try {
              // 1. إعادة المستند لجدوله الأصلي
              await setDoc(doc(db, record.originalCollection, record.originalId), record.data);
              
              // 2. إزالته من السلة
              await deleteDoc(doc(db, "trash", id));
              
              Toast.success("تم استعادة وترميم السجل بنجاح وإعادته لقاعدة البيانات الفعالة.");
            } catch (err) {
              console.error(err);
              Toast.danger("حدث خطأ أثناء محاولة الاستعادة المباشرة.");
            }
          }
        });
      });

      document.querySelectorAll('.delete-final-btn').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          const id = e.target.closest('.delete-final-btn').dataset.id;
          if (confirm("🚨 تنبيه: هل تريد إتلاف وإزالة هذا السجل نهائياً تماماً من الخادم وقاعدة البيانات؟ لا يمكن التراجع!")) {
            await deleteDoc(doc(db, "trash", id));
            Toast.danger("تم إتلاف وإزالة السجل نهائياً.");
          }
        });
      });
    }
  </script>
</body>
</html>
