<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>سبيل - سجل الحضور</title>
  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <div class="app-container">
    <aside class="sidebar" id="appSidebar"></aside>

    <div class="main-wrapper" id="mainWrapper">
      <nav class="navbar" id="appNavbar"></nav>

      <main class="content-body">
        <div style="margin-bottom: 2rem;">
          <h1 style="font-size: 1.5rem; font-weight: 800; color: var(--text-primary);">سجل حضور وغياب الطلاب</h1>
          <p style="color: var(--text-secondary); font-size: 0.9rem;">متابعة يومية ومطابقة لحضور الطلاب، وغياب الطلاب المسجل بدون عذر.</p>
        </div>

        <div class="card">
          <div class="table-container" style="margin-top: 0;">
            <table>
              <thead>
                <tr>
                  <th>التاريخ</th>
                  <th>اسم الطالب</th>
                  <th>المعلم المسؤول</th>
                  <th>حالة الحضور</th>
                  <th>مدة الجلسة</th>
                </tr>
              </thead>
              <tbody id="attendanceTableBody">
                <tr><td colspan="5" style="text-align: center; color: var(--text-muted); padding: 1.5rem;">جاري جلب ومطابقة بيانات الحضور اليومية...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
  </div>

  <div id="toast-container"></div>

  <script type="module">
    import { auth, db } from '../assets/js/config/firebase.js';
    import { protectRoute } from '../assets/js/features/auth/authService.js';
    import { renderSidebar } from '../assets/js/shared/components/sidebar.js';
    import { renderNavbar } from '../assets/js/shared/components/navbar.js';
    import { collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    protectRoute('admin');

    auth.onAuthStateChanged((user) => {
      if (user) {
        renderSidebar('attendance', 'admin');
        renderNavbar('سجل حضور الدارسين', { name: 'الإدارة العامة', roleName: 'مدير الأكاديمية' });
        initAttendanceRealtime();
      }
    });

    function initAttendanceRealtime() {
      const tbody = document.getElementById('attendanceTableBody');
      if (!tbody) return;

      onSnapshot(collection(db, "sessions"), (snapshot) => {
        if (snapshot.empty) {
          tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: var(--text-muted); padding: 1.5rem;">لا توجد جلسات أو غيابات مرصودة حالياً.</td></tr>`;
          return;
        }

        const list = [];
        snapshot.forEach(docSnap => {
          list.push(docSnap.data());
        });

        // ترتيب من الأحدث للأقدم
        list.sort((a,b) => b.date.localeCompare(a.date));

        tbody.innerHTML = list.map(s => {
          let stateLabel = "";
          let stateStyle = "";
          
          if (s.status === "completed") {
            stateLabel = "حاضر مكتمل ✅";
            stateStyle = "background-color: var(--success-light); color: var(--success);";
          } else if (s.status === "student_absent") {
            if (s.absenceType === "unexcused") {
              stateLabel = "غياب طالب بدون عذر 🔴";
              stateStyle = "background-color: var(--danger-light); color: var(--danger);";
            } else {
              stateLabel = "غياب طالب بعذر مقبول 🟢";
              stateStyle = "background-color: var(--warning-light); color: var(--warning);";
            }
          } else {
            stateLabel = "مؤجلة / لم تتم ⏳";
            stateStyle = "background-color: var(--primary-light); color: var(--primary-color);";
          }

          return `
            <tr>
              <td><strong>${s.date}</strong></td>
              <td><strong>${s.studentName}</strong></td>
              <td>${s.teacherName}</td>
              <td><span style="padding: 0.25rem 0.5rem; border-radius: 6px; font-size: 0.8rem; font-weight: 700; ${stateStyle}">${stateLabel}</span></td>
              <td>${s.duration} دقيقة</td>
            </tr>
          `;
        }).join('');

        if (window.lucide) {
          window.lucide.createIcons();
        }
      });
    }
  </script>
</body>
</html>
