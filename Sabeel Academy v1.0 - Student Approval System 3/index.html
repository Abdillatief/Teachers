<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>أكاديمية سبيل - تسجيل الدخول</title>
  
  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/components.css">
  
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background-color: var(--bg-primary); padding: 1rem;">

  <div class="card" style="width: 100%; max-width: 440px; box-shadow: var(--shadow-lg);">
    <div style="text-align: center; margin-bottom: 2rem;">
      <div class="logo" style="justify-content: center; align-items: center; margin-bottom: 0.75rem; font-size: 2.2rem; flex-direction: column; gap: 0.5rem;" id="loginLogoContainer">
        <i data-lucide="graduation-cap" style="width:72px;height:72px;color:var(--primary-color);"></i>
        <span style="font-weight:800;">سبيل</span>
      </div>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">البريد الإلكتروني</label>
        <div style="position: relative; display: flex; align-items: center;">
          <input type="email" id="email" class="form-control" placeholder="name@example.com" required style="padding-right: 2.5rem;">
          <i data-lucide="mail" style="position: absolute; right: 0.75rem; color: var(--text-muted); width: 18px;"></i>
        </div>
      </div>

      <div class="form-group">
        <label for="password">كلمة المرور</label>
        <div style="position: relative; display: flex; align-items: center;">
          <input type="password" id="password" class="form-control" placeholder="••••••••" required style="padding-right: 2.5rem; padding-left: 2.5rem;">
          <i data-lucide="lock" style="position: absolute; right: 0.75rem; color: var(--text-muted); width: 18px;"></i>
          <button type="button" id="togglePasswordBtn" style="position: absolute; left: 0.75rem; background: none; border: none; color: var(--text-muted); cursor: pointer; display: flex; align-items: center;">
            <i data-lucide="eye" id="eyeIcon" style="width: 18px; height: 18px;"></i>
            <i data-lucide="eye-off" id="eyeOffIcon" style="width: 18px; height: 18px; display: none;"></i>
          </button>
        </div>
      </div>

      <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; font-size: 0.85rem;">
        <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer; color: var(--text-secondary);">
          <input type="checkbox" id="rememberMe"> تذكرني
        </label>
        <a href="#" id="forgotPasswordBtn" style="color: var(--primary-color); text-decoration: none;">نسيت كلمة المرور؟</a>
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%; gap: 0.5rem; font-size:1rem; font-weight:700;">
        <i data-lucide="log-in"></i> تسجيل الدخول
      </button>
    </form>

    <div style="margin-top: 1.5rem; text-align: center; font-size: 0.9rem; color: var(--text-secondary);">
      <span>ليس لديك حساب معلم؟</span>
      <a href="register.html" style="color: var(--primary-color); text-decoration: none; font-weight: 600; margin-right: 0.25rem;">سجل كمعلم جديد</a>
    </div>
  </div>

  <div id="toast-container"></div>

  <script type="module" src="assets/js/features/auth/loginController.js"></script>
  
  <script>
    if (window.lucide) {
      window.lucide.createIcons();
    }
  </script>
</body>
</html>
