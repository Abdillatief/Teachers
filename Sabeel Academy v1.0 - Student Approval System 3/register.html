<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>أكاديمية سبيل - تسجيل معلم جديد</title>
  
  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/components.css">
  
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background-color: var(--bg-primary); padding: 2rem 1rem;">

  <div class="card" style="width: 100%; max-width: 500px; box-shadow: var(--shadow-lg);">
    <div style="text-align: center; margin-bottom: 1.5rem;">
      <div class="logo" style="justify-content: center; margin-bottom: 0.5rem; font-size: 2rem;">
        <i data-lucide="user-plus" style="width:40px;height:40px;color:var(--primary-color);"></i>
        <span style="font-weight:800;">انضم كمعلم</span>
      </div>
      <p style="color: var(--text-secondary); font-size: 0.9rem;">سجل حسابك وسيقوم المسؤول بمراجعته وتفعيله</p>
    </div>

    <form id="registerForm">
      <div class="form-group">
        <label for="name">الاسم الكامل</label>
        <input type="text" id="name" class="form-control" placeholder="الاسم رباعي باللغة العربية" required>
      </div>

      <div class="form-group">
        <label for="phone">رقم الهاتف</label>
        <input type="tel" id="phone" class="form-control" placeholder="+966xxxxxxxxx" required>
      </div>

      <div class="form-group">
        <label for="email">البريد الإلكتروني</label>
        <input type="email" id="email" class="form-control" placeholder="teacher@sabeel.com" required>
      </div>

      <div class="form-group">
        <label for="password">كلمة المرور</label>
        <input type="password" id="password" class="form-control" placeholder="لا تقل عن 8 خانات" minlength="8" required>
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; gap: 0.5rem; font-weight:700;">
        <i data-lucide="send"></i> إرسال طلب الانضمام
      </button>
    </form>

    <div style="margin-top: 1.5rem; text-align: center; font-size: 0.9rem; color: var(--text-secondary);">
      <span>ولديك حساب بالفعل؟</span>
      <a href="index.html" style="color: var(--primary-color); text-decoration: none; font-weight: 600; margin-right: 0.25rem;">تسجيل الدخول</a>
    </div>
  </div>

  <div id="toast-container"></div>

  <script type="module" src="assets/js/features/auth/registerController.js"></script>

  <script>
    if (window.lucide) {
      window.lucide.createIcons();
    }
  </script>
</body>
</html>
