<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>سبيل - الحصص الجارية</title>
  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .modal-overlay {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background-color: rgba(0,0,0,0.5); z-index: 10000; align-items: center; justify-content: center; padding: 1rem;
    }
    .modal-card {
      background-color: var(--bg-secondary); border-radius: var(--border-radius);
      border: 1px solid var(--border-color); width: 100%; max-width: 480px; padding: 2rem;
    }
    .student-session-row {
      display: flex; justify-content: space-between; align-items: center; padding: 1rem;
      background-color: var(--bg-primary); border: 1px solid var(--border-color);
      border-radius: 8px; margin-bottom: 0.75rem; transition: transform 0.2s;
    }
    .student-session-row:hover {
      transform: translateX(-4px);
    }
  </style>
</head>
<body>

  <div class="app-container">
    <aside class="sidebar" id="appSidebar"></aside>

    <div class="main-wrapper" id="mainWrapper">
      <nav class="navbar" id="appNavbar"></nav>

      <main class="content-body">
        
        <div style="margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;">
          <div>
            <h1 style="font-size: 1.5rem; font-weight: 800; color: var(--text-primary); margin: 0;">فصول وحصص اليوم الجارية</h1>
            <p style="color: var(--text-secondary); font-size: 0.9rem; margin-top: 0.25rem;">تسجيل حضور ومشاركة الدارسين وتأجيل أو إلغاء الحصص المجدولة اليوم.</p>
          </div>
          <div style="font-size: 0.85rem; padding: 0.5rem 1rem; border-radius: 30px; background-color: rgba(var(--primary-rgb, 14, 165, 233), 0.1); color: var(--primary-color); font-weight: 700;" id="todayDateLabel">
            اليوم: ...
          </div>
        </div>

        <div class="card">
          <h3 style="font-weight: 800; font-size: 1.15rem; margin-bottom: 1.25rem; display: flex; align-items: center; gap: 0.5rem;">
            <i data-lucide="play-circle" style="color: var(--primary-color);"></i> جدول الحصص والدارسين لليوم الجاري
          </h3>
          
          <div id="todayLessonsListContainer" style="display: flex; flex-direction: column;">
            <p style="text-align: center; color: var(--text-muted); padding: 2rem;">جاري تحميل جدول اليوم الفوري...</p>
          </div>
        </div>

      </main>
    </div>
  </div>

  <!-- مودال تسجيل الحصة المنبثق التفاعلي بدعم كامل للغياب والتأجيل والدروس الجماعية -->
  <div id="recordSessionModal" class="modal-overlay">
    <div class="modal-card">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
        <h3 style="font-weight: 800; color: var(--text-primary); margin: 0; display: flex; align-items: center; gap: 0.5rem;">
          <i data-lucide="edit-3" style="color: var(--primary-color);"></i> تسجيل وإثبات الحصة
        </h3>
        <span id="btnCloseModalBtnHeader" style="cursor: pointer; padding: 0.25rem; display: flex; align-items: center; justify-content: center;">
          <i data-lucide="x" style="color: var(--text-muted);"></i>
        </span>
      </div>

      <form id="recordSessionForm">
        <div class="form-group">
          <label style="font-size: 0.75rem;">الاسم الشخصي للطالب</label>
          <input type="text" id="recStudentName" class="form-control" readonly style="background-color: var(--bg-primary); font-weight: bold;">
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem;">
          <div class="form-group">
            <label for="recDuration">مدة الحصة (بالدقائق)</label>
            <select id="recDuration" class="form-control">
              <option value="30">30 دقيقة</option>
              <option value="45">45 دقيقة</option>
              <option value="60" selected>60 دقيقة (ساعة)</option>
              <option value="90">90 دقيقة</option>
              <option value="120">120 دقيقة (ساعتان)</option>
            </select>
          </div>
          <div class="form-group">
            <label for="recType">تصنيف الدرس الحالي</label>
            <select id="recType" class="form-control">
              <option value="individual" selected>فردي (Indiv)</option>
              <option value="group">مجموعة جماعية (Group)</option>
            </select>
          </div>
        </div>

        <div class="form-group" style="margin-top: 1rem;">
          <label for="recStatus">حالة الحضور والتسجيل</label>
          <select id="recStatus" class="form-control" style="border: 2px solid var(--primary-color);">
            <option value="completed" selected>حاضر ومكتمل (Completed) ✅</option>
            <option value="student_absent">غياب الطالب (Student Absent) 🔴</option>
            <option value="delayed">تأجيل الحصة لزمن آخر (Delayed) ⏳</option>
            <option value="cancelled">ملغاة من الأكاديمية (Cancelled) ❌</option>
          </select>
        </div>

        <!-- مدخل فرعي لحالة غياب الدارس -->
        <div id="absenceTypeContainer" class="form-group" style="display: none; margin-top: 1rem; padding: 1rem; background-color: var(--bg-primary); border: 1px dashed var(--border-color); border-radius: 8px;">
          <label for="recAbsenceType">تفاصيل ومبرر الغياب</label>
          <select id="recAbsenceType" class="form-control">
            <option value="unexcused" selected>غياب غير مبرر (بدون عذر) - يُحسب في الأجر 🔴</option>
            <option value="excused">غياب مبرر (بعذر مسبق) - لا يُحسب في الأجر 🟢</option>
          </select>
        </div>

        <!-- مدخل فرعي لتأجيل الحصة -->
        <div id="postponeContainer" class="form-group" style="display: none; margin-top: 1rem; padding: 1rem; background-color: var(--bg-primary); border: 1px dashed var(--border-color); border-radius: 8px;">
          <h4 style="font-size: 0.82rem; font-weight: 800; color: var(--primary-color); margin-bottom: 0.75rem;"><i data-lucide="clock"></i> جدولة الموعد البديل للحصة</h4>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem;">
            <div class="form-group">
              <label style="font-size: 0.75rem;">التاريخ الجديد</label>
              <select id="recNewDate" class="form-control" style="border: 1px solid var(--border-color); width: 100%;">
                <option value="">-- اختر اليوم البديل --</option>
              </select>
            </div>
            <div class="form-group">
              <label style="font-size: 0.75rem;">الوقت الجديد</label>
              <select id="recNewTime" class="form-control" style="border: 1px solid var(--border-color); width: 100%;">
                <option value="">-- اختر الوقت البديل --</option>
              </select>
            </div>
          </div>
        </div>

        <div class="form-group" style="margin-top: 1rem;">
          <label for="recRating">تقييم فهم ومشاركة الطالب</label>
          <select id="recRating" class="form-control">
            <option value="5">ممتاز (5/5) ⭐⭐⭐⭐⭐</option>
            <option value="4">جيد جداً (4/5) ⭐⭐⭐⭐</option>
            <option value="3">متوسط (3/5) ⭐⭐⭐</option>
            <option value="2">ضعيف (2/5) ⭐⭐</option>
            <option value="1">يحتاج تحسين (1/5) ⭐</option>
          </select>
        </div>

        <!-- مساعد المنهج والواجب الذكي للقرآن -->
        <div id="smartQuranHelperCard" class="card" style="display: none; margin-top: 1rem; padding: 1rem; background-color: var(--bg-primary); border: 1px dashed var(--success); border-radius: 8px;">
          <h4 style="font-size: 0.8rem; font-weight: 800; color: var(--success); margin: 0 0 0.5rem 0; display: flex; align-items: center; gap: 0.35rem;">
            <i data-lucide="sparkles" style="width: 16px; height: 16px;"></i> نظام الاقتراح الذكي للواجب والمنهج
          </h4>
          <p id="smartQuranSuggestionText" style="font-size: 0.8rem; color: var(--text-secondary); margin: 0 0 0.75rem 0; line-height: 1.4;"></p>
          
          <button type="button" id="btnApplySmartSuggestion" class="btn btn-secondary" style="font-size: 0.75rem; padding: 0.35rem 0.75rem; border-color: var(--success); color: var(--success); font-weight: 700; width: 100%; justify-content: center; display: flex; align-items: center; gap: 0.25rem; background: transparent; cursor: pointer;">
            <i data-lucide="check" style="width: 14px; height: 14px;"></i> تطبيق الاقتراح التلقائي في الملاحظات والواجب
          </button>

          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-top: 0.75rem; border-top: 1px dashed var(--border-color); padding-top: 0.75rem;">
            <div class="form-group" style="margin: 0;">
              <label style="font-size: 0.7rem; color: var(--text-secondary); margin-bottom: 0.25rem;">السورة المحفوظة اليوم</label>
              <select id="smartActualSurahId" class="form-control" style="font-size: 0.75rem; height: auto; padding: 0.35rem;"></select>
            </div>
            <div class="form-group" style="margin: 0;">
              <label style="font-size: 0.7rem; color: var(--text-secondary); margin-bottom: 0.25rem;">آخر آية تم حفظها اليوم</label>
              <input type="number" id="smartActualVerse" class="form-control" style="font-size: 0.75rem; height: auto; padding: 0.35rem;" placeholder="مثال: 15">
            </div>
          </div>
        </div>

        <div class="form-group" style="margin-top: 1rem;">
          <label for="recNotes">ملاحظات الدرس والواجب</label>
          <input type="text" id="recNotes" class="form-control" placeholder="اكتب الآيات المنجزة أو الواجب المدرسي...">
        </div>

        <div style="display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 1.5rem;">
          <button type="submit" class="btn btn-primary" id="btnSubmitRecord">تأكيد وتسجيل الحصة فوريًا</button>
          <button type="button" class="btn btn-secondary" id="btnCancelModalBtn">إلغاء</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast-container"></div>

  <script type="module">
    import { auth, db } from '../assets/js/config/firebase.js';
    import { protectRoute } from '../assets/js/features/auth/authService.js';
    import { renderSidebar } from '../assets/js/shared/components/sidebar.js';
    import { renderNavbar } from '../assets/js/shared/components/navbar.js';
    import { collection, onSnapshot, query, where, getDoc, doc, setDoc, serverTimestamp, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { Toast } from '../assets/js/shared/utils/toast.js';
    import { writeAuditLog } from '../assets/js/features/audit/auditService.js';
    import { quranSurahs, getNextHomeworkSuggestion } from '../assets/js/shared/utils/quranData.js';

    protectRoute('teacher');

    let currentTeacher = null;
    let studentsCached = [];
    let sessionsCached = [];
    let activeStudentForRecording = null;

    // تعيين وعرض تاريخ اليوم
    const arabicDays = ["الأحد", "الاثنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة", "السبت"];
    const todayObj = new Date();
    document.getElementById('todayDateLabel').textContent = `اليوم: ${arabicDays[todayObj.getDay()]} (${todayObj.toLocaleDateString('ar-EG')})`;

    auth.onAuthStateChanged(async (user) => {
      if (user) {
        try {
          const userDoc = await getDoc(doc(db, "users", user.uid));
          if (userDoc.exists()) {
            currentTeacher = { uid: user.uid, ...userDoc.data() };
            
            renderSidebar('today-sessions', 'teacher');
            renderNavbar('الحصص الجارية اليومية', { name: currentTeacher.name, roleName: 'معلم معتمد' });
            
            populatePostponeDropdowns();
            initTeacherDashboardRealtime();
          }
        } catch (err) {
          console.error("خطأ قراءة بيانات المعلم:", err);
        }
      }
    });

    // توليد خيارات التاريخ والوقت لتأجيل الحصص
    function populatePostponeDropdowns() {
      const dateSelect = document.getElementById('recNewDate');
      const timeSelect = document.getElementById('recNewTime');
      if (!dateSelect || !timeSelect) return;

      // ملء الـ 14 يوم القادمة
      const daysAr = ["الأحد", "الاثنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة", "السبت"];
      let dateOpts = '<option value="">-- اختر اليوم البديل --</option>';
      const today = new Date();
      for (let i = 1; i <= 14; i++) {
        const nextDay = new Date(today.getFullYear(), today.getMonth(), today.getDate() + i);
        const yyyy = nextDay.getFullYear();
        const mm = String(nextDay.getMonth() + 1).padStart(2, '0');
        const dd = String(nextDay.getDate()).padStart(2, '0');
        const valStr = `${yyyy}-${mm}-${dd}`;
        const dayLabel = `${daysAr[nextDay.getDay()]} (${nextDay.toLocaleDateString('ar-EG', {month: 'numeric', day: 'numeric'})})`;
        dateOpts += `<option value="${valStr}">${dayLabel}</option>`;
      }
      dateSelect.innerHTML = dateOpts;

      // ملء الأوقات
      const timesList = [
        "08:00 صباحاً", "08:30 صباحاً", "09:00 صباحاً", "09:30 صباحاً", "10:00 صباحاً", "10:30 صباحاً", "11:00 صباحاً", "11:30 صباحاً",
        "12:00 مساءً", "12:30 مساءً", "01:00 مساءً", "01:30 مساءً", "02:00 مساءً", "02:30 مساءً", "03:00 مساءً", "03:30 مساءً",
        "04:00 مساءً", "04:30 مساءً", "05:00 مساءً", "05:30 مساءً", "06:00 مساءً", "06:30 مساءً", "07:00 مساءً", "07:30 مساءً",
        "08:00 مساءً", "08:30 مساءً", "09:00 مساءً", "09:30 مساءً", "10:00 مساءً", "10:30 مساءً", "11:00 مساءً", "11:30 مساءً"
      ];
      let timeOpts = '<option value="">-- اختر الوقت البديل --</option>';
      timesList.forEach(t => {
        timeOpts += `<option value="${t}">${t}</option>`;
      });
      timeSelect.innerHTML = timeOpts;
    }

    function initTeacherDashboardRealtime() {
      // 1. مراقبة قائمة الطلاب المنتسبين للمعلم
      const qStudents = query(collection(db, "students"), where("teacherId", "==", currentTeacher.uid));
      onSnapshot(qStudents, (snapshot) => {
        studentsCached = [];
        snapshot.forEach(docSnap => {
          studentsCached.push({ id: docSnap.id, ...docSnap.data() });
        });

        // 2. مراقبة سجل الحصص الخاص بالمعلم باليوم الحالي
        const qSessions = query(collection(db, "sessions"), where("teacherId", "==", currentTeacher.uid));
        onSnapshot(qSessions, (sessSnap) => {
          sessionsCached = [];
          sessSnap.forEach(docSnap => {
            sessionsCached.push({ id: docSnap.id, ...docSnap.data() });
          });

          renderTodayLessonsList();
        });
      });
    }

    function parseTimeToMinutes(timeStr) {
      if (!timeStr || typeof timeStr !== 'string') return 9999;
      let str = timeStr.trim().toLowerCase();
      let isPM = false;
      let isAM = false;
      if (str.includes("pm") || str.includes("مساءً") || str.includes("مساء") || str.includes("م")) {
        isPM = true;
      }
      if (str.includes("am") || str.includes("صباحاً") || str.includes("صباح") || str.includes("ص")) {
        isAM = true;
      }
      let match = str.match(/(\d+):(\d+)/);
      if (!match) match = str.match(/(\d+)/);
      if (!match) return 9999;
      let hours = parseInt(match[1]);
      let minutes = match[2] ? parseInt(match[2]) : 0;
      if (isPM && hours < 12) {
        hours += 12;
      } else if (isAM && hours === 12) {
        hours = 0;
      }
      if (hours < 12 && !isAM && !isPM) {
        if (hours > 0 && hours < 12) {
          hours += 12; // الافتراضي للحصص هو المساء (بعد الظهر) ما لم يُذكر غير ذلك
        }
      }
      return hours * 60 + minutes;
    }

    function renderTodayLessonsList() {
      const listContainer = document.getElementById('todayLessonsListContainer');
      const todayArabic = arabicDays[new Date().getDay()];
      const todayStr = new Date().toISOString().split('T')[0];

      // فحص الطلاب المجدول حضورهم اليوم
      const activeStudentsToday = studentsCached.filter(student => {
        if (student.status === "archived" || student.status === "Suspended") return false;
        
        // التحقق من جدول الأيام
        const scheduleDays = (student.schedule && student.schedule.days) ? student.schedule.days : (student.sessionDays || []);
        const isScheduledToday = scheduleDays.includes(todayArabic);

        // أو لديهم جلسة مؤجلة منسوبة لتاريخ اليوم
        const hasPostponedSessionToday = sessionsCached.some(sess => 
          sess.studentId === student.id && 
          sess.date === todayStr && 
          sess.status === "delayed"
        );

        return isScheduledToday || hasPostponedSessionToday;
      });

      // دالة لاستخراج وقت الحصة الفعلي لليوم
      const getStudentSessionTimeToday = (student) => {
        let sessionTime = student.schedule?.uniformTime || student.sessionTime || "";
        if (student.schedule?.differentTimes && student.schedule?.times?.[todayArabic]) {
          sessionTime = student.schedule.times[todayArabic];
        }
        return sessionTime;
      };

      // ترتيب الحصص بالترتيب الزمني
      activeStudentsToday.sort((a, b) => {
        const timeA = getStudentSessionTimeToday(a);
        const timeB = getStudentSessionTimeToday(b);
        return parseTimeToMinutes(timeA) - parseTimeToMinutes(timeB);
      });

      if (activeStudentsToday.length === 0) {
        listContainer.innerHTML = `<p style="text-align: center; color: var(--text-muted); padding: 2rem;">لا توجد حصص مجدولة مسجلة ليوم (${todayArabic}) الحالي.</p>`;
        return;
      }

      listContainer.innerHTML = activeStudentsToday.map(student => {
        // التحقق مما إذا تم تسجيل الحصة له باليوم الحالي بالفعل من المعلم
        const recordedSession = sessionsCached.find(sess => 
          sess.studentId === student.id && 
          (sess.date === todayStr || sess.postponedFrom === todayStr) &&
          (sess.status === "completed" || sess.status === "student_absent" || sess.status === "cancelled" || sess.status === "delayed")
        );

        let actionBtnHtml = "";
        if (recordedSession) {
          let badgeLabel = "";
          let badgeColor = "";
          if (recordedSession.status === "completed") {
            badgeLabel = "حاضر ومكتمل ✅";
            badgeColor = "background-color: var(--success-light); color: var(--success);";
          } else if (recordedSession.status === "student_absent") {
            badgeLabel = recordedSession.absenceType === "unexcused" ? "غياب بدون عذر 🔴" : "غياب بعذر مقبول 🟢";
            badgeColor = "background-color: var(--warning-light); color: var(--warning);";
          } else if (recordedSession.status === "delayed") {
            badgeLabel = `مؤجلة لـ ${recordedSession.date} ⏳`;
            badgeColor = "background-color: var(--primary-light); color: var(--primary-color);";
          } else {
            badgeLabel = "ملغاة ❌";
            badgeColor = "background-color: var(--danger-light); color: var(--danger);";
          }

          actionBtnHtml = `<span class="badge" style="position:static; font-weight:700; ${badgeColor}">${badgeLabel}</span>`;
        } else {
          actionBtnHtml = `<button class="btn btn-primary record-session-btn" data-id="${student.id}" style="padding: 0.4rem 0.8rem; font-size: 0.82rem;"><i data-lucide="edit-3" style="width:14px;height:14px;"></i> تسجيل الحصة</button>`;
        }

        // تحديد وقت الحصة لليوم
        let sessionTime = student.schedule?.uniformTime || "غير محدد";
        if (student.schedule?.differentTimes && student.schedule?.times?.[todayArabic]) {
          sessionTime = student.schedule.times[todayArabic];
        }

        return `
          <div class="student-session-row">
            <div>
              <strong style="font-size:0.95rem; color: var(--text-primary);">${student.name}</strong>
              <div style="font-size: 0.75rem; color: var(--text-secondary); margin-top:0.25rem;">
                <span>الموعد: 🕒 ${sessionTime}</span>
              </div>
            </div>
            <div>${actionBtnHtml}</div>
          </div>
        `;
      }).join('');

      if (window.lucide) {
        window.lucide.createIcons();
      }

      // تفعيل زر تسجيل الحصة المنبثق
      document.querySelectorAll('.record-session-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const id = e.target.closest('.record-session-btn').dataset.id;
          activeStudentForRecording = studentsCached.find(s => s.id === id);
          if (activeStudentForRecording) {
            openRecordSessionModal(activeStudentForRecording);
          }
        });
      });
    }

    const modal = document.getElementById('recordSessionModal');
    const recStatus = document.getElementById('recStatus');
    const absenceTypeContainer = document.getElementById('absenceTypeContainer');
    const postponeContainer = document.getElementById('postponeContainer');

    // ملء قائمة السور للذكاء الاصطناعي
    const actualSurahSelect = document.getElementById('smartActualSurahId');
    if (actualSurahSelect) {
      actualSurahSelect.innerHTML = quranSurahs.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
    }

    const smartQuranHelperCard = document.getElementById('smartQuranHelperCard');
    const smartQuranSuggestionText = document.getElementById('smartQuranSuggestionText');
    const btnApplySmartSuggestion = document.getElementById('btnApplySmartSuggestion');
    const smartActualVerse = document.getElementById('smartActualVerse');

    function openRecordSessionModal(student) {
      document.getElementById('recStudentName').value = student.name;
      recStatus.value = "completed";
      absenceTypeContainer.style.display = "none";
      postponeContainer.style.display = "none";

      // تحديد الاقتراح الذكي للواجب والمنهج للدارس المحدد
      const studentProgress = {
        lastMemorizedSurahId: parseInt(student.lastMemorizedSurahId) || 1,
        lastMemorizedVerse: parseInt(student.lastMemorizedVerse) || 0
      };

      const suggestion = getNextHomeworkSuggestion(studentProgress);

      if (smartQuranSuggestionText) {
        smartQuranSuggestionText.innerHTML = `
          آخر آية مسجلة للدارس الكريم: <strong style="color: var(--text-primary);">${student.lastMemorizedSurahName || 'الفاتحة'} (الآية ${student.lastMemorizedVerse || 0})</strong>.<br>
          المنهج والواجب التلقائي المقترح التالي: <strong style="color: var(--success);">${suggestion.text}</strong>.
        `;
      }

      if (actualSurahSelect) actualSurahSelect.value = suggestion.surahId;
      if (smartActualVerse) smartActualVerse.value = suggestion.endVerse;

      if (smartQuranHelperCard) smartQuranHelperCard.style.display = 'block';

      // زر تطبيق الملاحظات
      if (btnApplySmartSuggestion) {
        btnApplySmartSuggestion.onclick = (e) => {
          e.preventDefault();
          document.getElementById('recNotes').value = suggestion.text;
          Toast.success("تم إدراج الواجب المقترح في حقل الملاحظات! ✨");
        };
      }
      
      modal.style.display = "flex";
    }

    // استماع تغيير حالة الحصة لتوليد مدخلات الغياب والتأجيل ديناميكيًا
    recStatus.addEventListener('change', () => {
      const state = recStatus.value;
      absenceTypeContainer.style.display = state === "student_absent" ? "block" : "none";
      postponeContainer.style.display = state === "delayed" ? "block" : "none";
    });

    document.getElementById('btnCloseModalBtnHeader').addEventListener('click', () => {
      modal.style.display = "none";
    });
    document.getElementById('btnCancelModalBtn').addEventListener('click', () => {
      modal.style.display = "none";
    });

    // معالجة تسجيل الحصة فوريًا بالحفظ في Firestore
    document.getElementById('recordSessionForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const duration = parseInt(document.getElementById('recDuration').value);
      const type = document.getElementById('recType').value;
      const status = recStatus.value;
      const rating = parseFloat(document.getElementById('recRating').value);
      const notes = document.getElementById('recNotes').value.trim();
      const absenceType = document.getElementById('recAbsenceType').value;
      
      const newDate = document.getElementById('recNewDate').value;
      const newTime = document.getElementById('recNewTime').value;

      const todayStr = new Date().toISOString().split('T')[0];
      const submitBtn = document.getElementById('btnSubmitRecord');
      submitBtn.disabled = true;

      try {
        let finalDate = todayStr;
        let finalTime = new Date().toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
        let postponedFrom = "";

        // حالة التأجيل وتعديل التاريخ البديل
        if (status === "delayed") {
          if (!newDate || !newTime) {
            Toast.warning("يرجى تحديد التاريخ والوقت البديل لجدولة الحصة المؤجلة.");
            submitBtn.disabled = false;
            return;
          }
          finalDate = newDate;
          finalTime = newTime;
          postponedFrom = todayStr;
        }

        const sessionDocRef = doc(collection(db, "sessions"));
        const sessionPayload = {
          id: sessionDocRef.id,
          studentId: activeStudentForRecording.id,
          studentName: activeStudentForRecording.name,
          teacherId: currentTeacher.uid,
          teacherName: currentTeacher.name,
          date: finalDate,
          time: finalTime,
          duration: duration,
          type: type,
          status: status,
          absenceType: status === "student_absent" ? absenceType : "",
          rating: rating,
          notes: notes,
          postponedFrom: postponedFrom,
          approved: false, // بانتظار موافقة الأدمن للاعتماد المالي
          createdAt: serverTimestamp()
        };

        // 1. إدراج وثيقة الحصة بقاعدة البيانات
        await setDoc(sessionDocRef, sessionPayload);

        // 2. تحديث عدد الحصص التراكمية في ملف الطالب بالزيادة عند الحضور الناجح أو غياب بدون عذر
        if (status === "completed" || (status === "student_absent" && absenceType === "unexcused")) {
          const currentCount = parseInt(activeStudentForRecording.sessionsCount || 0);
          const studentDocRef = doc(db, "students", activeStudentForRecording.id);
          const updateFields = {
            sessionsCount: currentCount + 1,
            lastSessionDate: todayStr
          };

          if (status === "completed") {
            const actualSurahIdSelect = document.getElementById('smartActualSurahId');
            const actualVerseInput = document.getElementById('smartActualVerse');
            if (actualSurahIdSelect && actualVerseInput) {
              const actualSurahId = parseInt(actualSurahIdSelect.value);
              const actualVerse = parseInt(actualVerseInput.value) || 0;
              const actualSurahObj = quranSurahs.find(s => s.id === actualSurahId);
              if (actualSurahObj) {
                updateFields.lastMemorizedSurahId = actualSurahId;
                updateFields.lastMemorizedVerse = actualVerse;
                updateFields.lastMemorizedSurahName = actualSurahObj.name;

                // تحديث قائمة السور المكتملة للأرشيف البصري
                const completedSurahsList = activeStudentForRecording.completedSurahs || [];
                if (actualVerse >= actualSurahObj.verses && !completedSurahsList.includes(actualSurahId)) {
                  completedSurahsList.push(actualSurahId);
                  updateFields.completedSurahs = completedSurahsList;
                }
              }
            }
          }

          await updateDoc(studentDocRef, updateFields);
        }

        // 3. تدوين سجل نشاط المعلم للتدقيق
        const actionType = type === "group" ? "ADD_GROUP_SESSIONS" : "ADD_INDIVIDUAL_SESSION";
        await writeAuditLog(currentTeacher.uid, currentTeacher.name, actionType, null, { studentName: activeStudentForRecording.name, duration, status });

        Toast.success("تم تسجيل وبث الحصة وتحديث الإحصائيات فوريًا بنجاح ✅");
        modal.style.display = "none";
        document.getElementById('recordSessionForm').reset();
      } catch (err) {
        console.error(err);
        Toast.danger("حدث خطأ أثناء محاولة حفظ الحصة.");
      } finally {
        submitBtn.disabled = false;
      }
    });

  </script>
</body>
</html>
