<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>سبيل - بث الإشعارات</title>
  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <div class="app-container">
    <aside class="sidebar" id="appSidebar"></aside>

    <div class="main-wrapper" id="mainWrapper">
      <nav class="navbar" id="appNavbar"></nav>

      <main class="content-body">
        <div style="margin-bottom: 2rem;">
          <h1 style="font-size: 1.5rem; font-weight: 800; color: var(--text-primary);">بث وإرسال الإشعارات العامة</h1>
          <p style="color: var(--text-secondary); font-size: 0.9rem;">إرسال تعميمات فورية لجميع طاقم التدريس بالأكاديمية أو معلمين محددين فوريًا.</p>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1.5fr; gap: 1.5rem; flex-wrap: wrap;">
          <div class="card">
            <h3 style="font-weight: 700; font-size: 1.1rem; margin-bottom: 1.25rem;">بث إشعار جديد</h3>
            <form id="broadcastNotificationForm">
              <div class="form-group">
                <label for="notifTitle">عنوان التعميم</label>
                <input type="text" id="notifTitle" class="form-control" placeholder="اكتب العنوان..." required style="font-weight: bold;">
              </div>

              <div class="form-group">
                <label for="notifBody">محتوى وتفاصيل الرسالة</label>
                <textarea id="notifBody" class="form-control" rows="4" placeholder="اكتب نص الإشعار الكامل..." required></textarea>
              </div>

              <div class="form-group">
                <label for="notifRecipient">المستهدف بالبث</label>
                <select id="notifRecipient" class="form-control" style="font-weight: 600;">
                  <option value="all">الكل (بث عام لكافة المعلمين) 👥</option>
                </select>
              </div>

              <button type="submit" class="btn btn-primary" style="width: 100%; gap: 0.5rem; font-weight: 700; margin-top: 1rem;">
                <i data-lucide="send"></i> بث التعميم الآن
              </button>
            </form>
          </div>

          <div class="card">
            <h3 style="font-weight: 700; font-size: 1.1rem; margin-bottom: 1.25rem;">التعميمات والإشعارات الصادرة سابقاً</h3>
            <div id="sentNotificationsList" style="display: flex; flex-direction: column; gap: 1rem; max-height: 500px; overflow-y: auto;">
              <!-- سيتم ملؤها ديناميكيًا -->
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <div id="toast-container"></div>

  <script type="module">
    import { auth, db } from '../assets/js/config/firebase.js';
    import { protectRoute } from '../assets/js/features/auth/authService.js';
    import { renderSidebar } from '../assets/js/shared/components/sidebar.js';
    import { renderNavbar } from '../assets/js/shared/components/navbar.js';
    import { collection, onSnapshot, doc, getDocs, deleteDoc, addDoc, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { Toast } from '../assets/js/shared/utils/toast.js';
    import { showCustomConfirm } from '../assets/js/shared/utils/helpers.js';

    protectRoute('admin');

    auth.onAuthStateChanged((user) => {
      if (user) {
        renderSidebar('notifications', 'admin');
        renderNavbar('بث الإشعارات والتعميمات', { name: 'الإدارة العامة', roleName: 'مدير الأكاديمية' });
        initNotificationsPanel();
      }
    });

    function initNotificationsPanel() {
      // 1. جلب المعلمين لتعبئة القائمة إذا رغبنا في فلترة مستقبلية
      const teachersQuery = query(collection(db, "users"), where("role", "==", "teacher"));
      getDocs(teachersQuery).then(snap => {
        const select = document.getElementById('notifRecipient');
        snap.forEach(docSnap => {
          const t = docSnap.data();
          const opt = document.createElement('option');
          opt.value = docSnap.id;
          opt.textContent = `المعلم: ${t.name}`;
          select.appendChild(opt);
        });
      });

      // 2. تفعيل الاستماع الفوري لقائمة الإشعارات
      const listContainer = document.getElementById('sentNotificationsList');
      onSnapshot(collection(db, "notifications"), (snapshot) => {
        if (snapshot.empty) {
          listContainer.innerHTML = `<p style="text-align: center; color: var(--text-muted); padding: 1.5rem;">لا توجد تعميمات مسجلة أو مرسلة مسبقاً.</p>`;
          return;
        }

        const items = [];
        snapshot.forEach(docSnap => {
          items.push({ id: docSnap.id, ...docSnap.data() });
        });

        // الترتيب من الأحدث للأقدم
        items.sort((a,b) => {
          const timeA = a.createdAt?.seconds || 0;
          const timeB = b.createdAt?.seconds || 0;
          return timeB - timeA;
        });

        listContainer.innerHTML = items.map(item => {
          const dateStr = item.createdAt ? new Date(item.createdAt.seconds * 1000).toLocaleString('ar-EG') : 'الآن';
          return `
            <div style="background-color: var(--bg-primary); border: 1px solid var(--border-color); padding: 1rem; border-radius: 8px; position: relative;">
              <h4 style="font-weight: 800; color: var(--text-primary); margin-bottom: 0.25rem;">${item.title}</h4>
              <p style="font-size: 0.85rem; color: var(--text-secondary); line-height: 1.4; margin-bottom: 0.5rem;">${item.body}</p>
              <div style="display: flex; justify-content: space-between; align-items: center; font-size: 0.72rem; color: var(--text-muted);">
                <span>تاريخ الإرسال: ${dateStr}</span>
                <span>المستهدف: ${item.recipientId === 'all' ? 'بث عام للكل 👥' : 'مستهدف فردي 👤'}</span>
              </div>
              <button class="btn btn-secondary delete-notif-btn" data-id="${item.id}" style="position: absolute; left: 0.5rem; top: 0.5rem; padding: 0.25rem; color: var(--danger);"><i data-lucide="trash-2" style="width: 14px; height: 14px;"></i></button>
            </div>
          `;
        }).join('');

        if (window.lucide) {
          window.lucide.createIcons();
        }

        // تفعيل حذف الإشعارات
        document.querySelectorAll('.delete-notif-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const id = e.target.closest('.delete-notif-btn').dataset.id;
            showCustomConfirm("هل تريد حذف هذا الإشعار من سجل الإشهار نهائياً؟", async () => {
              await deleteDoc(doc(db, "notifications", id));
              Toast.danger("تم إزالة الإشعار الصادر.");
            });
          });
        });
      });
    }

    // إرسال وبث إشعار
    document.getElementById('broadcastNotificationForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const title = document.getElementById('notifTitle').value.trim();
      const body = document.getElementById('notifBody').value.trim();
      const recipientId = document.getElementById('notifRecipient').value;

      try {
        await addDoc(collection(db, "notifications"), {
          title,
          body,
          recipientId,
          readBy: [],
          createdAt: serverTimestamp()
        });

        Toast.success("تم بث التعميم وإرسال الإشعار لجميع الأطراف المشمولة بنجاح ✅");
        document.getElementById('broadcastNotificationForm').reset();
      } catch (err) {
        console.error(err);
        Toast.danger("حدث خطأ أثناء محاولة بث وتوزيع الإشعار.");
      }
    });
  </script>
</body>
</html>
