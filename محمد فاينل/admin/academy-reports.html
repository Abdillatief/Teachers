<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>سبيل - التقارير الإدارية</title>
  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <div class="app-container">
    <aside class="sidebar" id="appSidebar"></aside>

    <div class="main-wrapper" id="mainWrapper">
      <nav class="navbar" id="appNavbar"></nav>

      <main class="content-body">
        <div style="margin-bottom: 2rem;">
          <h1 style="font-size: 1.5rem; font-weight: 800; color: var(--text-primary);">التقارير وسجلات الأداء العام</h1>
          <p style="color: var(--text-secondary); font-size: 0.9rem;">إنشاء ومطابقة تقارير الحصص المسجلة وأعداد الدارسين دورياً.</p>
        </div>

        <div class="card">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem; flex-wrap:wrap; gap:1rem;">
            <h3 style="font-weight:700; font-size:1.1rem; margin:0;">سجل الحصص الإجمالي لجميع المعلمين</h3>
            <button class="btn btn-secondary" id="printReportBtn"><i data-lucide="printer"></i> طباعة كشف التقارير</button>
          </div>

          <div class="table-container" style="margin-top: 0;">
            <table>
              <thead>
                <tr>
                  <th>التاريخ</th>
                  <th>المعلم المشرف</th>
                  <th>اسم الطالب</th>
                  <th>المدة الزمنية</th>
                  <th>حالة الحصة</th>
                </tr>
              </thead>
              <tbody id="reportsTableBody">
                <tr><td colspan="5" style="text-align: center; color: var(--text-muted); padding: 1.5rem;">جاري جلب ومزامنة سجلات الأداء العام...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
  </div>

  <div id="toast-container"></div>

  <script type="module">
    import { auth, db } from '../assets/js/config/firebase.js';
    import { protectRoute } from '../assets/js/features/auth/authService.js';
    import { renderSidebar } from '../assets/js/shared/components/sidebar.js';
    import { renderNavbar } from '../assets/js/shared/components/navbar.js';
    import { collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    protectRoute('admin');

    auth.onAuthStateChanged((user) => {
      if (user) {
        renderSidebar('academy-reports', 'admin');
        renderNavbar('التقارير الأكاديمية', { name: 'الإدارة العامة', roleName: 'مدير الأكاديمية' });
        initAcademyReports();
      }
    });

    function initAcademyReports() {
      const tbody = document.getElementById('reportsTableBody');
      if (!tbody) return;

      onSnapshot(collection(db, "sessions"), (snapshot) => {
        if (snapshot.empty) {
          tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: var(--text-muted); padding: 1.5rem;">لا توجد حصص مسجلة في سجلات الأكاديمية حالياً.</td></tr>`;
          return;
        }

        const list = [];
        snapshot.forEach(docSnap => {
          list.push(docSnap.data());
        });

        // ترتيب من الأحدث للأقدم
        list.sort((a,b) => b.date.localeCompare(a.date));

        tbody.innerHTML = list.map(s => `
          <tr>
            <td><strong>${s.date}</strong></td>
            <td>${s.teacherName}</td>
            <td><strong>${s.studentName}</strong></td>
            <td>${s.duration} دقيقة</td>
            <td>
              <span style="padding: 0.25rem 0.5rem; border-radius: 6px; font-size: 0.8rem; font-weight: 600; 
                background-color: ${s.status === 'completed' ? 'var(--success-light); color: var(--success);' : 'var(--warning-light); color: var(--warning);'}">
                ${s.status === 'completed' ? 'تمت بنجاح' : (s.status === 'student_absent' ? 'غياب الطالب' : 'مؤجلة / ملغاة')}
              </span>
            </td>
          </tr>
        `).join('');

        if (window.lucide) {
          window.lucide.createIcons();
        }
      });
    }

    document.getElementById('printReportBtn').addEventListener('click', () => {
      window.print();
    });
  </script>
</body>
</html>
